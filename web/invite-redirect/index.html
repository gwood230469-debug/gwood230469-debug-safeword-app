<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Join a family circle on SafeWord</title>
  <style>
    :root {
      color-scheme: light;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    body {
      background: #FAF7F2;
      color: #1A1A1A;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .brand {
      font-size: 28px;
      font-weight: 700;
      color: #0F2A4A;
      margin-bottom: 16px;
    }
    .explainer {
      font-size: 17px;
      color: #1A1A1A;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .store-link {
      display: inline-block;
      min-height: 44px;
      line-height: 44px;
      padding: 0 24px;
      border-radius: 28px;
      font-size: 17px;
      font-weight: 600;
      text-decoration: none;
    }
    .store-link.primary {
      background: #0F2A4A;
      color: #FFFFFF;
    }
    .store-link.outline {
      background: transparent;
      color: #0F2A4A;
      border: 1.5px solid #0F2A4A;
    }
    .status {
      font-size: 14px;
      color: #6B6459;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">SafeWord</div>
    <p class="explainer">Someone wants you to join their family circle on SafeWord — it's how you'll both know a call is really the other person, not a scam.</p>
    <div class="buttons">
      <a class="store-link primary" href="https://play.google.com/store/apps/details?id=com.gwood230469debug.safeword">Get it on Google Play</a>
      <!-- Placeholder: no App Store id exists in the repo yet. Replace "#"
           with the real https://apps.apple.com/app/id<ID> URL once the app
           has been submitted and an App Store listing exists. -->
      <a class="store-link outline" href="#">Download on the App Store</a>
    </div>
    <p class="status" id="status">Opening SafeWord…</p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');
      var statusEl = document.getElementById('status');

      if (token) {
        // Attempt to hand off into the installed app immediately. If the app
        // isn't installed, this simply does nothing and the page underneath
        // (store links) is what the visitor is left looking at.
        window.location.href = 'safeword://invite/' + encodeURIComponent(token);
      } else {
        statusEl.textContent = 'This invite link is missing its code.';
      }

      setTimeout(function () {
        statusEl.textContent = token
          ? "Don't have SafeWord installed yet? Get it below."
          : 'Ask whoever sent this for a fresh invite link.';
      }, 1500);
    })();
  </script>
</body>
</html>
